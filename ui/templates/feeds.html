{{ define "main" }}
<div>
  <div class="flex justify-between items-center mb-4 border-b pb-2">
    <h2 class="text-xl font-normal">Feeds ({{.count}})</h2>
    <div class="flex space-x-4 text-sm">
      <button
        class="text-primary hover:underline bg-transparent border-none p-0 cursor-pointer font-normal"
      >
        Export
      </button>
      <button
        class="text-primary hover:underline bg-transparent border-none p-0 cursor-pointer font-normal"
      >
        Import
      </button>
      <button
        class="text-primary hover:underline bg-transparent border-none p-0 cursor-pointer font-normal"
      >
        Refresh all
      </button>
    </div>
  </div>
  <div class="mb-4">
    <form
      hx-post="/feeds/"
      hx-target="#feed-list"
      hx-swap="afterbegin"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="flex items-center space-x-2 mt-4"
    >
      <input
        type="url"
        name="feedUrl"
        placeholder="Enter feed URL..."
        class="flex-grow p-2 border rounded text-sm focus:outline-none focus:ring-1 focus:ring-primary"
        required
      />
      <button
        type="submit"
        class="bg-primary text-white px-4 py-2 rounded text-sm hover:bg-primary-dark focus:outline-none focus:ring-1 focus:ring-primary-dark"
      >
        Add Feed
      </button>
    </form>
  </div>

  <!-- Feed Sources List -->
  <div id="feed-list" class="space-y-1">
    {{ if .feeds }} {{ range .feeds }} {{ template "feed-entry" . }} {{ end }}
    {{ else }}
    <p>No feeds to show.</p>
    {{ end }}
  </div>
</div>
{{ end }}
